
networks:
  linkvault_net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:
  db:
    image: postgres:15
    container_name: linkvault-db
    networks:
      - linkvault_net
    environment:
      POSTGRES_USER: linkuser
      POSTGRES_PASSWORD: linkpass
      POSTGRES_DB: linkvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkuser -d linkvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: linkvault-app
    networks:
      - linkvault_net
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://linkuser:linkpass@db:5432/linkvault
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus:latest
    container_name: linkvault-prometheus
    networks:
      - linkvault_net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - node-exporter
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: linkvault-node-exporter
    networks:
      - linkvault_net
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: linkvault-grafana
    networks:
      - linkvault_net
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped
    